  <script src="https://cdn.tailwindcss.com"></script>

    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#000000',

            powder: '#B6DFF1',
            accent: '#DDEEFF',

  <style type="text/css">
    body {

      scroll-behavior: smooth;
    }
    .glass-nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #F2F2F7;
    }
    ::-webkit-scrollbar-thumb {
      background: #D1D1D6;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {

    }

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

  <script type="text/babel" data-presets="env,react">

    const { useState, useEffect, useMemo, useRef } = React;

    const initialProducts = [

        specifications: [

        ]
      },
      {
        _id: 'prod3',
        name: 'Satin Silk Resort Shirt',
        description: 'A flowing, relaxed-fit resort collar shirt woven from heavyweight 22-momme organic mulberry silk. Offers a subtle matte lustre and natural temperature regulation.',
        price: 240.00,

        ],

          { name: 'Care', value: 'Dry clean only' }
        ],
        images: [
          'https://images.unsplash.com/photo-1596755094514-f87e34085b2c?q=80&w=800',

        ]
      },
      {
        _id: 'prod4',
        name: 'Alpaca Oversized Trench Coat',
        description: 'A luxurious winter coat spun from Peruvian baby-alpaca fibers blended with virgin wool. Styled with a classic double-breasted closure, storm flap, and structural belt.',
        price: 1100.00,
        discountPrice: 950.00,
        sku: 'APP-COAT-04',
        brand: 'Aether',
        category: 'apparel',
        stockCount: 8,
        rating: 4.9,
        tags: ['alpaca', 'coat', 'trench', 'apparel', 'winter'],
        features: [
          '70% Baby Alpaca, 30% Virgin Wool',
          '100% Cupro silk lining'
        ],
        specifications: [
          { name: 'Color', value: 'Camel Tan' },
          { name: 'Length', value: 'Calf-length' }
        ],
        images: [
          'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=800',
          'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=800'
        ]
      },
      {
        _id: 'prod5',
        name: 'Cashmere Lounge Sweater',
        description: 'The ultimate luxury essential. Spun from double-ply, long-staple Mongolian cashmere, offering unparalleled softness and lofted warmth. Ribbed trim details.',
        price: 320.00,
        discountPrice: 280.00,
        sku: 'APP-SWEATER-05',
        brand: 'Vibe Atelier',
        category: 'apparel',
        stockCount: 25,
        rating: 4.6,
        tags: ['cashmere', 'sweater', 'apparel', 'winter'],
        features: [
          '100% Pure Mongolian Cashmere',
          'Mock collar neck profile'
        ],
        specifications: [
          { name: 'Gauge', value: '12 GG' }
        ],
        images: [
          'https://images.unsplash.com/photo-1574169208507-84376144848b?q=80&w=800',
          'https://images.unsplash.com/photo-1614975058789-41316d0e2e9c?q=80&w=800'
        ]
      },
      {
        _id: 'prod6',
        name: 'Carrara Marble Tray',
        description: 'Carved from a single solid block of Italian Carrara marble, featuring polished curves, veining, and a velvet protective base.',
        price: 135.00,
        discountPrice: 0.00,
        sku: 'HOM-TRAY-06',
        brand: 'Stone & Vessel',
        category: 'home-living',
        stockCount: 30,
        rating: 4.8,
        tags: ['marble', 'tray', 'home', 'living', 'stone'],
        features: [
          '100% Italian white Carrara marble',
          'Velvet backing prevents scratching'
        ],
        specifications: [
          { name: 'Dimensions', value: '30 cm x 20 cm x 3 cm' }
        ],
        images: [
          'https://images.unsplash.com/photo-1513519245088-0e12902e5a38?q=80&w=800',
          'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=800'
        ]
      }
    ];

    const RatingStars = ({ value }) => {
      const stars = [];
      const rounded = Math.floor(value);
      for (let i = 1; i <= 5; i++) {
        if (i <= rounded) {
          stars.push(<span key={i} className="text-yellow-500">&#9733;</span>);
        } else {
          stars.push(<span key={i} className="text-gray-300">&#9733;</span>);
        }
      }
      return <div className="flex text-xs">{stars}</div>;
    };

    // Main App Container
    const App = () => {
      const [user, setUser] = useState(() => {
        try {
          const saved = localStorage.getItem('vibe_user');
          return saved ? JSON.parse(saved) : { name: 'Elena Rostova', email: 'user@vibestore.com', role: 'admin', addresses: [{ street: '12 Luxury Ave, Penthouse A', city: 'New York', state: 'NY', postalCode: '10001', country: 'United States', isDefault: true }] };
        } catch (e) {
          return { name: 'Elena Rostova', email: 'user@vibestore.com', role: 'admin', addresses: [{ street: '12 Luxury Ave, Penthouse A', city: 'New York', state: 'NY', postalCode: '10001', country: 'United States', isDefault: true }] };
        }
      });

      const [cart, setCart] = useState(() => {
        try {
          const saved = localStorage.getItem('vibe_cart');
          return saved ? JSON.parse(saved) : [];
        } catch (e) {
          return [];
        }
      });

      const [wishlist, setWishlist] = useState(() => {
        try {
          const saved = localStorage.getItem('vibe_wishlist');
          return saved ? JSON.parse(saved) : [];
        } catch (e) {
          return [];
        }
      });

      const [products, setProducts] = useState(() => {
        try {
          const saved = localStorage.getItem('vibe_products');
          return saved ? JSON.parse(saved) : initialProducts;
        } catch (e) {
          return initialProducts;
        }
      });

      // Coupon state mock
      const [coupons, setCoupons] = useState([
        { code: 'VIBE10', discountPercent: 10, minSpend: 50, expireDate: '2026-12-31' },
        { code: 'LUXE20', discountPercent: 20, minSpend: 200, expireDate: '2026-12-31' }
      ]);

      // Route State Controller
      const [currentRoute, setCurrentRoute] = useState({ path: 'home', params: {} });
      const [selectedCategory, setSelectedCategory] = useState('');
      const [showChat, setShowChat] = useState(false);
      const [chatMessages, setChatMessages] = useState([
        { sender: 'ai', text: 'Welcome to Vibe Store support. I am your luxury AI stylist. Ask me about matching collection coordinates.' }
      ]);
      const [chatInput, setChatInput] = useState('');

      useEffect(() => {
        localStorage.setItem('vibe_user', user ? JSON.stringify(user) : '');
      }, [user]);

      useEffect(() => {
        localStorage.setItem('vibe_cart', JSON.stringify(cart));
      }, [cart]);

      useEffect(() => {
        localStorage.setItem('vibe_wishlist', JSON.stringify(wishlist));
      }, [wishlist]);

      useEffect(() => {
        localStorage.setItem('vibe_products', JSON.stringify(products));
      }, [products]);

      const itemsPrice = cart.reduce((sum, item) => {
        const price = item.discountPrice > 0 ? item.discountPrice : item.price;
        return sum + price * item.qty;
      }, 0);
      const shippingPrice = itemsPrice > 200 || itemsPrice === 0 ? 0 : 15;
      const taxPrice = itemsPrice * 0.085;
      const totalPrice = itemsPrice + shippingPrice + taxPrice;

      const navigateTo = (path, params = {}) => {
        setCurrentRoute({ path, params });
        window.scrollTo(0, 0);
      };

      const handleAddToCart = (product, qty = 1) => {
        setCart(prev => {
          const exists = prev.find(item => item._id === product._id);
          if (exists) {
            return prev.map(item => item._id === product._id ? { ...item, qty: Math.min(product.stockCount, item.qty + qty) } : item);
          }
          return [...prev, { ...product, qty }];
        });
      };

      const handleRemoveFromCart = (productId) => {
        setCart(prev => prev.filter(item => item._id !== productId));
      };

      const handleToggleWishlist = (product) => {
        setWishlist(prev => {
          const exists = prev.some(item => item._id === product._id);
          if (exists) {
            return prev.filter(item => item._id !== product._id);
          }
          return [...prev, product];
        });
      };

      const handleSendChatMessage = (e) => {
        e.preventDefault();
        if (!chatInput.trim()) return;
        const userMsg = { sender: 'user', text: chatInput };
        setChatMessages(prev => [...prev, userMsg]);
        const inputLower = chatInput.toLowerCase();
        setChatInput('');

        setTimeout(() => {
          let reply = 'I suggest matching the Satin Silk Resort Shirt with the Alpaca Trench Coat for structured layering.';
          if (inputLower.includes('watch') || inputLower.includes('timepiece')) {
            reply = 'The Aether Chrono Watch is crafted from sandblasted Grade 5 titanium, featuring double-domed sapphire glass.';
          } else if (inputLower.includes('marble') || inputLower.includes('tray')) {
            reply = 'The Carrara Marble Tray is carved from solid Italian marble and pairs perfectly with the borosilicate glass burner.';
          }
          setChatMessages(prev => [...prev, { sender: 'ai', text: reply }]);
        }, 800);
      };

      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [currentRoute, cart, wishlist, showChat, chatMessages]);

      return (
        <div className="flex flex-col min-h-screen bg-white">
          
          {/* NAVBAR */}
          <nav className="fixed top-0 left-0 w-full z-50 glass-nav py-4">
            <div className="max-w-7xl mx-auto px-6 md:px-12 flex items-center justify-between">
              <button onClick={() => navigateTo('home')} className="text-lg md:text-xl font-semibold tracking-[0.2em] text-primary">
                VIBE STORE
              </button>

              <div className="hidden lg:flex items-center space-x-8">
                <button onClick={() => { setSelectedCategory(''); navigateTo('shop'); }} className="text-xs uppercase tracking-widest font-semibold hover:text-luxury-grey transition-colors">Shop All</button>
                <button onClick={() => { setSelectedCategory('apparel'); navigateTo('shop'); }} className="text-xs uppercase tracking-widest font-semibold hover:text-luxury-grey transition-colors">Apparel</button>
                <button onClick={() => { setSelectedCategory('accessories'); navigateTo('shop'); }} className="text-xs uppercase tracking-widest font-semibold hover:text-luxury-grey transition-colors">Accessories</button>
                <button onClick={() => { setSelectedCategory('home-living'); navigateTo('shop'); }} className="text-xs uppercase tracking-widest font-semibold hover:text-luxury-grey transition-colors">Home Living</button>
                <button onClick={() => navigateTo('about')} className="text-xs uppercase tracking-widest font-semibold hover:text-luxury-grey transition-colors">Story</button>
                <button onClick={() => navigateTo('faq')} className="text-xs uppercase tracking-widest font-semibold hover:text-luxury-grey transition-colors">FAQ</button>
              </div>

              <div className="flex items-center space-x-6 text-primary">
                <button onClick={() => navigateTo('shop')} className="hover:text-luxury-grey">
                  <i data-lucide="search" className="w-4 h-4"></i>
                </button>

                <button onClick={() => navigateTo('wishlist')} className="relative hover:text-luxury-grey">
                  <i data-lucide="heart" className="w-4 h-4"></i>
                  {wishlist.length > 0 && (
                    <span className="absolute -top-1.5 -right-1.5 bg-primary text-white text-[8px] w-3.5 h-3.5 rounded-full flex items-center justify-center font-bold">
                      {wishlist.length}
                    </span>
                  )}
                </button>

                <button onClick={() => navigateTo('cart')} className="relative hover:text-luxury-grey">
                  <i data-lucide="shopping-bag" className="w-4 h-4"></i>
                  {cart.length > 0 && (
                    <span className="absolute -top-1.5 -right-1.5 bg-primary text-white text-[8px] w-3.5 h-3.5 rounded-full flex items-center justify-center font-bold">
                      {cart.reduce((a, b) => a + b.qty, 0)}
                    </span>
                  )}
                </button>

                {/* Account Settings Menu */}
                <div className="relative group">
                  <button className="hover:text-luxury-grey">
                    <i data-lucide="user" className="w-4 h-4"></i>
                  </button>
                  <div className="absolute right-0 mt-2 w-48 bg-white border rounded-xl shadow-lg py-2 hidden group-hover:block z-50">
                    {user ? (
                      <>
                        <div className="px-4 py-1.5 border-b mb-1">
                          <p className="text-[10px] text-gray-400">Signed in as</p>
                          <p className="text-xs font-semibold text-primary truncate">{user.name}</p>
                        </div>
                        <button onClick={() => navigateTo('dashboard')} className="w-full text-left px-4 py-2 text-xs text-primary hover:bg-luxury-silver">Dashboard</button>
                        {user.role === 'admin' && (
                          <button onClick={() => navigateTo('admin')} className="w-full text-left px-4 py-2 text-xs text-luxury-gold hover:bg-luxury-silver font-semibold">Admin Panel</button>
                        )}
                        <button onClick={() => { setUser(null); navigateTo('home'); }} className="w-full text-left px-4 py-2 text-xs text-red-600 hover:bg-red-50 border-t mt-1">Sign Out</button>
                      </>
                    ) : (
                      <>
                        <button onClick={() => navigateTo('login')} className="w-full text-left px-4 py-2 text-xs text-primary hover:bg-luxury-silver font-semibold">Sign In</button>
                        <button onClick={() => navigateTo('register')} className="w-full text-left px-4 py-2 text-xs text-primary hover:bg-luxury-silver">Create Account</button>
                      </>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </nav>

          {/* DYNAMIC SCREEN ROUTER */}
          <main className="flex-grow pt-24">
            {currentRoute.path === 'home' && (
              <HomeView
                products={products}
                navigateTo={navigateTo}
                handleAddToCart={handleAddToCart}
                handleToggleWishlist={handleToggleWishlist}
                wishlist={wishlist}
              />
            )}

            {currentRoute.path === 'shop' && (
              <ShopView
                products={products}
                selectedCategory={selectedCategory}
                setSelectedCategory={setSelectedCategory}
                navigateTo={navigateTo}
                handleAddToCart={handleAddToCart}
                handleToggleWishlist={handleToggleWishlist}
                wishlist={wishlist}
              />
            )}

            {currentRoute.path === 'details' && (
              <DetailsView
                productId={currentRoute.params.id}
                products={products}
                navigateTo={navigateTo}
                handleAddToCart={handleAddToCart}
                handleToggleWishlist={handleToggleWishlist}
                wishlist={wishlist}
              />
            )}

            {currentRoute.path === 'wishlist' && (
              <WishlistView
                wishlist={wishlist}
                navigateTo={navigateTo}
                handleToggleWishlist={handleToggleWishlist}
              />
            )}

            {currentRoute.path === 'cart' && (
              <CartView
                cart={cart}
                setCart={setCart}
                itemsPrice={itemsPrice}
                shippingPrice={shippingPrice}
                taxPrice={taxPrice}
                totalPrice={totalPrice}
                navigateTo={navigateTo}
                handleRemove={handleRemoveFromCart}
              />
            )}

            {currentRoute.path === 'checkout' && (
              <CheckoutView
                cart={cart}
                setCart={setCart}
                totalPrice={totalPrice}
                user={user}
                navigateTo={navigateTo}
              />
            )}

            {currentRoute.path === 'about' && <AboutView />}

            {currentRoute.path === 'faq' && <FaqView />}

            {currentRoute.path === 'privacy' && <PrivacyView />}

            {currentRoute.path === 'login' && <LoginView setUser={setUser} navigateTo={navigateTo} />}

            {currentRoute.path === 'register' && <RegisterView setUser={setUser} navigateTo={navigateTo} />}

            {currentRoute.path === 'dashboard' && <DashboardView user={user} navigateTo={navigateTo} />}

            {currentRoute.path === 'admin' && (
              <AdminView
                products={products}
                setProducts={setProducts}
                coupons={coupons}
                setCoupons={setCoupons}
                user={user}
                navigateTo={navigateTo}
              />
            )}
          </main>

          {/* FLOATING AI CHAT BOT WIDGET */}
          <div className="fixed bottom-6 right-6 z-50">
            {!showChat ? (
              <button onClick={() => setShowChat(true)} className="bg-primary hover:bg-luxury-dark text-white rounded-full p-4 shadow-lg border border-luxury-charcoal flex items-center justify-center">
                <i data-lucide="message-square" className="w-5 h-5"></i>
              </button>
            ) : (
              <div className="w-80 h-[380px] bg-white rounded-2xl border shadow-xl flex flex-col overflow-hidden animate-in fade-in duration-200">
                <div className="bg-primary text-white p-3 flex justify-between items-center">
                  <div className="flex items-center space-x-2">
                    <i data-lucide="sparkles" className="w-3.5 h-3.5 text-powder"></i>
                    <span className="text-[10px] uppercase tracking-widest font-bold">Vibe AI Stylist</span>
                  </div>
                  <button onClick={() => setShowChat(false)} className="text-gray-400 hover:text-white">
                    <i data-lucide="x" className="w-4 h-4"></i>
                  </button>
                </div>
                
                <div className="flex-grow p-3 bg-luxury-silver/30 overflow-y-auto space-y-3">
                  {chatMessages.map((msg, i) => (
                    <div key={i} className={`flex ${msg.sender === 'user' ? 'justify-end':'justify-start'}`}>
                      <div className={`p-2.5 rounded-xl text-xs max-w-[80%] ${msg.sender === 'user' ? 'bg-primary text-white':'bg-white text-primary border shadow-sm'}`}>
                        {msg.text}
                      </div>
                    </div>
                  ))}
                </div>

                <form onSubmit={handleSendChatMessage} className="p-2 border-t flex gap-2">
                  <input
                    type="text"
                    value={chatInput}
                    onChange={e=>setChatInput(e.target.value)}
                    placeholder="Ask stylistic suggestions..."
                    className="flex-grow bg-luxury-silver border-0 text-xs py-2 px-3 rounded-lg outline-none"
                  />
                  <button type="submit" className="bg-primary text-white p-2 rounded-lg"><i data-lucide="send" className="w-3.5 h-3.5"></i></button>
                </form>
              </div>
            )}
          </div>

          {/* FOOTER */}
          <footer className="bg-primary text-white pt-16 pb-10 mt-20 border-t border-luxury-charcoal">
            <div className="max-w-7xl mx-auto px-6 md:px-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
              <div className="space-y-4">
                <span className="text-md font-semibold tracking-widest">VIBE STORE</span>
                <p className="text-xs text-luxury-grey leading-relaxed font-light">
                  An editing of premium essentials, curated for modern rituals. Formulated on minimalistic principles.
                </p>
              </div>
              <div className="space-y-3">
                <h4 className="text-[10px] uppercase tracking-widest font-semibold text-powder">Directory</h4>
                <div className="flex flex-col space-y-1.5 text-xs text-luxury-grey font-light">
                  <button onClick={() => navigateTo('shop')} className="text-left hover:text-white">Catalog</button>
                  <button onClick={() => navigateTo('about')} className="text-left hover:text-white">Our Story</button>
                  <button onClick={() => navigateTo('privacy')} className="text-left hover:text-white">Privacy Policy</button>
                </div>

    // LOGIN VIEW
    const LoginView = ({ setUser, navigateTo }) => {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        const loggedUser = {
          name: email === 'admin@vibestore.com' ? 'System Administrator' : 'Elena Rostova',
          email,
          role: email === 'admin@vibestore.com' ? 'admin' : 'user',
          addresses: [
            { street: '12 Luxury Ave, Penthouse A', city: 'New York', state: 'NY', postalCode: '10001', country: 'United States', isDefault: true }
          ]
        };
        setUser(loggedUser);
        navigateTo('home');
      };

      const handleQuickLoad = (role) => {
        if (role === 'admin') {
          setEmail('admin@vibestore.com');
          setPassword('admin123');
        } else {
          setEmail('user@vibestore.com');
          setPassword('user123');
        }
      };

      return (
        <div className="max-w-sm mx-auto px-6 py-16 space-y-6 animate-in fade-in duration-300">
          <h1 className="text-xl tracking-widest uppercase font-light text-center">Sign In</h1>
          
          <form onSubmit={handleLoginSubmit} className="space-y-4">
            <input type="email" placeholder="Email Address" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-luxury-silver py-2.5 px-4 rounded-xl text-xs outline-none" required />
            <input type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-luxury-silver py-2.5 px-4 rounded-xl text-xs outline-none" required />
            <button type="submit" className="w-full bg-primary text-white text-xs uppercase font-bold py-3 rounded-xl tracking-widest shadow">Sign In</button>
          </form>

          <div className="bg-luxury-silver p-4 rounded-xl border space-y-2">
            <p className="text-[10px] text-luxury-grey">Load sandbox roles:</p>
            <div className="flex gap-2">
              <button onClick={()=>handleQuickLoad('user')} className="bg-white border text-[10px] py-1.5 px-3 rounded-lg flex-1 text-primary font-semibold">User Role</button>
              <button onClick={()=>handleQuickLoad('admin')} className="bg-white border text-[10px] py-1.5 px-3 rounded-lg flex-1 text-luxury-gold font-semibold">Admin Role</button>
            </div>
          </div>
        </div>
      );
    };

    // REGISTER VIEW
    const RegisterView = ({ setUser, navigateTo }) => {
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      
      const handleRegister = (e) => {
        e.preventDefault();
        setUser({ name, email, role: 'user', addresses: [] });
        navigateTo('home');
      };

      return (
        <div className="max-w-sm mx-auto px-6 py-16 space-y-6 animate-in fade-in duration-300">
          <h1 className="text-xl tracking-widest uppercase font-light text-center">Create Account</h1>
          <form onSubmit={handleRegister} className="space-y-4">
            <input type="text" placeholder="Full Name" value={name} onChange={e=>setName(e.target.value)} className="w-full bg-luxury-silver py-2.5 px-4 rounded-xl text-xs outline-none" required />
            <input type="email" placeholder="Email Address" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-luxury-silver py-2.5 px-4 rounded-xl text-xs outline-none" required />
            <input type="password" placeholder="Password" className="w-full bg-luxury-silver py-2.5 px-4 rounded-xl text-xs outline-none" required />
            <button type="submit" className="w-full bg-primary text-white text-xs uppercase font-bold py-3 rounded-xl tracking-widest shadow">Register</button>
          </form>
        </div>
      );
    };

    // USER DASHBOARD VIEW
    const DashboardView = ({ user, navigateTo }) => {
      return (
        <div className="max-w-4xl mx-auto px-6 py-10 space-y-8 animate-in fade-in duration-300">
          <div>
            <span className="text-[10px] uppercase tracking-[0.3em] text-luxury-grey">Dashboard</span>
            <h1 className="text-2xl tracking-widest uppercase font-light">User Profile</h1>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="bg-luxury-silver p-6 rounded-2xl border space-y-2">
              <h3 className="text-xs uppercase font-semibold text-primary">Account Details</h3>
              <p className="text-xs text-luxury-grey">Name: <span className="text-primary font-medium">{user?.name}</span></p>
              <p className="text-xs text-luxury-grey">Email: <span className="text-primary font-medium">{user?.email}</span></p>
            </div>
            
            <div className="bg-luxury-silver p-6 rounded-2xl border space-y-2 md:col-span-2">
              <h3 className="text-xs uppercase font-semibold text-primary">Address Manager</h3>
              {user?.addresses && user.addresses.length > 0 ? (
                user.addresses.map((addr, i) => (
                  <div key={i} className="text-xs text-luxury-grey space-y-0.5">
                    <p className="font-semibold text-primary">{addr.street}</p>
                    <p>{addr.city}, {addr.state} {addr.postalCode}</p>
                    <p>{addr.country}</p>
                  </div>
                ))
              ) : (
                <p className="text-xs text-luxury-grey font-light">No saved addresses.</p>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ADMIN VIEW with Settings, Reviews and Coupon management tabs
    const AdminView = ({ products, setProducts, coupons, setCoupons, user, navigateTo }) => {
      const [activeSubTab, setActiveSubTab] = useState('analytics');

      const [newCode, setNewCode] = useState('');
      const [newPercent, setNewPercent] = useState(10);

      const handleDelete = (id) => {
        setProducts(prev => prev.filter(p => p._id !== id));
      };

      const handleAddCoupon = (e) => {
        e.preventDefault();
        if (!newCode.trim()) return;
        setCoupons(prev => [
          ...prev,
          { code: newCode.toUpperCase(), discountPercent: newPercent, minSpend: 50, expireDate: '2026-12-31' }
        ]);
        setNewCode('');
      };

      return (
        <div className="max-w-7xl mx-auto px-6 md:px-12 py-10 space-y-8 animate-in fade-in duration-300">
          <div className="flex justify-between items-end border-b pb-4 flex-wrap gap-4">
            <div>
              <span className="text-[10px] uppercase tracking-[0.3em] text-luxury-grey">Administrator Panel</span>
              <h1 className="text-2xl tracking-widest uppercase font-light">Console Hub</h1>
            </div>
            <div className="flex space-x-2 flex-wrap gap-y-2">
              {['analytics', 'products', 'coupons', 'settings'].map(tab => (
                <button
                  key={tab}
                  onClick={() => setActiveSubTab(tab)}
                  className={`py-1.5 px-3 rounded-lg text-xs uppercase tracking-wider font-semibold ${
                    activeSubTab === tab ? 'bg-primary text-white':'bg-luxury-silver text-primary'
                  }`}
                >
                  {tab}
                </button>
              ))}
            </div>
          </div>

          {activeSubTab === 'analytics' && (
            <div className="space-y-8">
              <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div className="bg-luxury-silver p-5 rounded-2xl border shadow-sm">
                  <span className="text-[9px] uppercase tracking-wider text-luxury-grey block mb-1">Total Revenue</span>
                  <p className="text-xl font-light text-primary">$28,430.00</p>
                </div>
                <div className="bg-luxury-silver p-5 rounded-2xl border shadow-sm">
                  <span className="text-[9px] uppercase tracking-wider text-luxury-grey block mb-1">Gross Orders</span>
                  <p className="text-xl font-light text-primary">142</p>
                </div>
                <div className="bg-luxury-silver p-5 rounded-2xl border shadow-sm">
                  <span className="text-[9px] uppercase tracking-wider text-luxury-grey block mb-1">Total Users</span>
                  <p className="text-xl font-light text-primary">85</p>
                </div>
                <div className="bg-luxury-silver p-5 rounded-2xl border shadow-sm">
                  <span className="text-[9px] uppercase tracking-wider text-luxury-grey block mb-1">Total Inventory</span>
                  <p className="text-xl font-light text-primary">{products.length}</p>
                </div>
              </div>

              <div className="bg-luxury-silver p-6 rounded-2xl border space-y-4">
                <h3 className="text-xs uppercase font-semibold tracking-wider text-primary">Monthly Revenue Chart</h3>
                <div className="flex items-end justify-between h-40 pt-4 max-w-xl">
                  {[
                    { m: 'Jan', val: 40 },
                    { m: 'Feb', val: 65 },
                    { m: 'Mar', val: 78 },
                    { m: 'Apr', val: 90 },
                    { m: 'May', val: 110 },
                    { m: 'Jun', val: 120 }
                  ].map((d, i) => (
                    <div key={i} className="flex flex-col items-center flex-1 space-y-2">
                      <div className="bg-powder w-10 rounded-t" style={{ height: `${d.val}px` }}></div>
                      <span className="text-[10px] text-luxury-grey font-semibold">{d.m}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {activeSubTab === 'products' && (
            <div className="space-y-4">
              <h3 className="text-xs uppercase font-semibold text-primary">Catalog Inventory CRUD</h3>
              <div className="bg-luxury-silver rounded-2xl overflow-hidden border">
                <table className="w-full text-xs text-left">
                  <thead className="bg-luxury-lightGrey border-b uppercase text-[9px] tracking-wider text-primary font-semibold">
                    <tr>
                      <th className="px-6 py-3">SKU</th>
                      <th className="px-6 py-3">Name</th>
                      <th className="px-6 py-3">Price</th>
                      <th className="px-6 py-3 text-right">Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {products.map(prod => (
                      <tr key={prod._id} className="border-b last:border-0 hover:bg-white/40">
                        <td className="px-6 py-3 font-mono font-semibold">{prod.sku}</td>
                        <td className="px-6 py-3 font-semibold text-primary">{prod.name}</td>
                        <td className="px-6 py-3">${prod.price.toFixed(2)}</td>
                        <td className="px-6 py-3 text-right">
                          <button onClick={() => handleDelete(prod._id)} className="text-red-500 font-semibold uppercase hover:underline">Delete</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {activeSubTab === 'coupons' && (
            <div className="space-y-6 grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
              <div className="space-y-4">
                <h3 className="text-xs uppercase font-semibold text-primary">Active Promotions</h3>
                <div className="bg-luxury-silver rounded-2xl p-4 border space-y-3">
                  {coupons.map((c, i) => (
                    <div key={i} className="flex justify-between items-center text-xs border-b pb-2 last:border-0">
                      <div>
                        <p className="font-semibold text-primary">{c.code}</p>
                        <p className="text-[10px] text-luxury-grey">Discount: {c.discountPercent}% &bull; Expire: {c.expireDate}</p>
                      </div>
                      <span className="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded uppercase font-bold">Active</span>
                    </div>
                  ))}
                </div>
              </div>

              <form onSubmit={handleAddCoupon} className="bg-luxury-silver p-6 rounded-2xl border space-y-4">
                <h3 className="text-xs uppercase font-semibold text-primary">Create Promo Code</h3>
                <div className="space-y-1">
                  <label className="text-[9px] uppercase tracking-wider text-luxury-grey">Code</label>
                  <input type="text" value={newCode} onChange={e=>setNewCode(e.target.value)} placeholder="VIBE30" className="w-full bg-white text-xs py-2 px-3 rounded-lg outline-none" required />
                </div>
                <div className="space-y-1">
                  <label className="text-[9px] uppercase tracking-wider text-luxury-grey">Discount Percent</label>
                  <input type="number" value={newPercent} onChange={e=>setNewPercent(Number(e.target.value))} className="w-full bg-white text-xs py-2 px-3 rounded-lg outline-none" required />
                </div>
                <button type="submit" className="w-full bg-primary text-white text-xs uppercase font-bold py-2.5 rounded-xl tracking-widest shadow">Add Promo</button>
              </form>
            </div>
          )}

          {activeSubTab === 'settings' && (
            <div className="bg-luxury-silver p-6 rounded-2xl border max-w-md space-y-4">
              <h3 className="text-xs uppercase font-semibold text-primary">System Configurations</h3>
              <div className="text-xs text-luxury-grey space-y-3">
                <div className="flex justify-between items-center">
                  <span>Carbon-Neutral courier courier shipping</span>
                  <input type="checkbox" defaultChecked className="rounded text-primary focus:ring-0" />
                </div>
                <div className="flex justify-between items-center">
                  <span>Tax calculations Rate (8.5%)</span>
                  <input type="checkbox" defaultChecked className="rounded text-primary focus:ring-0" />
                </div>
                <div className="flex justify-between items-center">
                  <span>Stripe Gateway sandbox simulation</span>
                  <input type="checkbox" defaultChecked className="rounded text-primary focus:ring-0" />
                </div>
                <div className="flex justify-between items-center">
                  <span>PayPal Gateway sandbox simulation</span>
                  <input type="checkbox" defaultChecked className="rounded text-primary focus:ring-0" />
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
